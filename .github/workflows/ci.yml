name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"

    - name: Initialize Database
      env:
        PYTHONPATH: src
      run: |
        python -m satlinksim.database

    - name: Run unit tests
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python -m pytest tests/

  validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"

    - name: Initialize Database
      env:
        PYTHONPATH: src
      run: |
        python -m satlinksim.database

    - name: Run Physics and Geometry Validations
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python val_and_bench/validation_correctness.py

    - name: Run Availability Validations
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python val_and_bench/availability_validation.py

    - name: Run NASA GPM Validation
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python real_world_validation/validate_rain_nasa_gpm.py

    - name: Run SGP4 SatNOGS Validation
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python real_world_validation/validate_sgp4_satnogs.py

    - name: Run Benchmarks
      env:
        PYTHONPATH: src
        MPLBACKEND: Agg
      run: |
        python val_and_bench/benchmarks.py
        python val_and_bench/parallel_benchmarks.py

    - name: Archive validation plots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-plots
        if-no-files-found: ignore
        path: |
          val_and_bench/*.png
          real_world_validation/*.png
          real_world_validation/plots/*.png
